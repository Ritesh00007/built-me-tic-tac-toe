<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">Tic-Tac-Toe</h1>

    <div class="scoreboard">
      <div class="score-card" id="score-x">
        <span class="score-label x-label">Player X</span>
        <span class="score-value" id="x-score">0</span>
      </div>
      <div class="score-card draws">
        <span class="score-label">Draws</span>
        <span class="score-value" id="draw-score">0</span>
      </div>
      <div class="score-card" id="score-o">
        <span class="score-label o-label">Player O</span>
        <span class="score-value" id="o-score">0</span>
      </div>
    </div>

    <div class="status-bar">
      <p class="status" id="status">Player <span id="current-player">X</span>'s turn</p>
    </div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <div class="buttons">
      <button class="btn" id="reset-btn">Reset Game</button>
      <button class="btn btn-secondary" id="clear-score-btn">Clear Scores</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
